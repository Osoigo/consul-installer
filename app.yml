---
- name: Set up web server
  hosts: rails
  become: true
  vars:
    ansible_user: "{{ deploy_user }}"
  roles:
    - letsencrypt
    - nginx

- name: Set up CONSUL DEMOCRACY
  hosts: rails
  become: true
  become_user: "{{ deploy_user }}"
  vars:
    # https://github.com/ansible/proposals/issues/89
    ansible_user: "{{ deploy_user }}"
  roles:
    - folder_structure
    - ruby
    - nodejs
    - rails
    - email
    - queue
    - puma

- name: Post-installation tasks
  hosts: rails
  become: true
  vars:
    ansible_user: "{{ deploy_user }}"
  roles:
    - memcached
    - timezone

- name: Install Errbit
  hosts: rails
  become: true
  vars:
    ansible_user: "{{ deploy_user }}"
  roles:
    - role: mongodb
      when: errbit|bool
    - role: errbit
      become_user: "{{ deploy_user }}"
      when: errbit|bool

- name: Check system
  hosts: rails
  become: true
  vars:
    ansible_user: "{{ deploy_user }}"
  roles:
    - specs
